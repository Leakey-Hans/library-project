<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library MS</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./script.js"></script>
</head>
<body>
    <div class="page-container">
        <div class="sidebar">
            <div class="side-title">Books</div>
            <div class="subtitle">Menu</div>
            <div>
                <ul class="list-items active">
                    <li class="active">My Books</li>
                    <li>Favorite Books</li>
                    <li>My Categories</li>
                    <li>My Messages</li>
                </ul>
            </div>
        </div>
        <div class="main-content">
            <div class="search-bar">
                <form action="" class="search">
                    <input type="text" placeholder="Search.." name="search">
                </form>
                <div class="profile">
                    <img src="./assets/noun-notification-8384878.png" alt="Notification Icon"  class="icon1">
                    <div>Leakey Hans Omondi</div>
                    <img src="./assets/indoor-shot-glad-young-bearded-man-mustache-wears-denim-shirt-smiles-happily.jpg" alt="profile picture" class="icon">
                </div>
            </div>
            <div class="content-title">
                <div>My Books</div>
                <button type="button">Add Book</button>
            </div>
            <div class="book-section">
            </div>
        </div>
    </div>
    <form action="#" class="addBook-form">
            <div class="form-nav">
                <h2>Add Book to Library</h2>
                <button type="button" class="form-button">X</button>
            </div>
            <label for="book-title">Title</label>
            <input type="text" name="book-title" id="book-title" required>
            <label for="author">Author</label>
            <input type="text" name="author" id="author" required>
            <label for="rating">Book rating</label>
            <input type="text" name="rating" id="rating" required min="1" max="5">
            <label for="status">Status</label>
            <input type="text" name="status" id="status" required>
            <button type="submit" class="form-button2">Add Book</button>
        </form>
</body>
</html>
