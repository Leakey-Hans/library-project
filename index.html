<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library MS</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./script.js"></script>
</head>
<body>
    <div class="page-container">
        <div class="sidebar">
            <div class="side-title">Books</div>
            <div class="subtitle">Menu</div>
            <div>
                <ul class="list-items active">
                    <li class="active">My Books</li>
                    <li>Favorite Books</li>
                    <li>My Categories</li>
                    <li>My Messages</li>
                </ul>
            </div>
        </div>
        <div class="main-content">
            <div class="search-bar">
                <form action="" class="search">
                    <input type="text" placeholder="Search.." name="search">
                </form>
                <div class="profile">
                    <img src="./assets/noun-notification-8384878.png" alt="Notification Icon"  class="icon1">
                    <div>Leakey Hans Omondi</div>
                    <img src="./assets/indoor-shot-glad-young-bearded-man-mustache-wears-denim-shirt-smiles-happily.jpg" alt="profile picture" class="icon">
                </div>
            </div>
            <div class="content-title">
                <div>My Books</div>
                <button type="button">Add Book</button>
            </div>
            <div class="book-section">
                <div class="book">
                    <img src="./assets/generic book cover.jpg" alt="Book Cover Image" class="book-cover">
                    <div class="book-meta">
                        <p class="book-title">The Color Purple</p>
                        <p class="book-author">Alice Walker</p>
                        <p class="book-rating">4.5 on Goodreads</p>
                        <p class="book-status">reading</p>
                        <p class="book-id"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
